+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3aef6962-dbaf-4d20-a5ff-2b161b0f213f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Jungle Design System — Foundations\n   Colors + Type tokens used across all Jungle surfaces.\n   Source of truth: jungle.baby codebase (app/globals.css),\n   Figma \"Jungle - New UI\", brand colour swatches.\n   ============================================================ */\n\n/* ---------- Feather Bold (display face) ---------- */\n@font-face {\n  font-family: \"Feather Bold\";\n  src:\n    url(\"4a432c4d-2edb-483b-8aed-b2165b3857b3\") format(\"woff2\"),\n    url(\"cd205d9a-14e9-4237-be86-8668c5b7895c\") format(\"woff\"),\n    url(\"e7dd2e50-4137-4c73-aecc-01cec325390d\") format(\"truetype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* Manrope (primary UI face) + Inter (secondary UI face) — served from\n   Google Fonts when used in HTML. Declared here for reference. */\n\n:root {\n  /* ========== BRAND PALETTE (primary) ========== */\n  /* From the brand colour swatches. \"Jungle Green\" is the anchor. */\n  --jb-green-900: #0c3c26;        /* deep \"Jungle\" — hero gradient base, emphasis text */\n  --jb-green-800: #1a4122;        /* pill bg, strong text on light */\n  --jb-green-700: #156641;        /* brand primary #1 (from palette) */\n  --jb-green-600: #04722f;        /* btn-green hover */\n  --jb-green-500: #009b4d;        /* BRAND PRIMARY — CTA, links, accents */\n  --jb-green-400: #46b100;        /* toggle \"on\", active state */\n  --jb-green-300: #4db404;        /* bright accent */\n  --jb-green-200: #58cc05;        /* bright success */\n  --jb-green-100: #e5f5ed;        /* banner bg, chip bg, selected row */\n  --jb-olive-700: #21321c;        /* slider thumb, dark earthy text */\n  --jb-olive-600: #647b4e;        /* progress track, earthy accents */\n  --jb-olive-500: #657b4e;        /* body accent text */\n\n  /* Warm neutrals — the \"off-white\" marketplace feel */\n  --jb-cream-100: #ecebe4;        /* brand off-white (from palette) */\n  --jb-cream-50:  #f5f5f0;        /* panel bg, warm page bg */\n  --jb-paper:     #ffffff;        /* pure paper */\n\n  /* Secondary / signal colors (from brand palette) */\n  --jb-yellow:    #eec71b;        /* J-logo yellow / highlight */\n  --jb-orange:    #ffa51f;        /* secondary accent */\n  --jb-red:       #f63f3c;        /* error / destructive */\n  --jb-blue:      #0795ed;        /* info, links alt */\n  --jb-lime:      #88c45a;        /* fresh secondary */\n  --jb-plum:      #ab5f99;        /* rare accent */\n  --jb-navy:      #223559;        /* rare accent */\n\n  /* ========== NEUTRALS ========== */\n  --jb-ink-900:   #0e0e11;        /* headings on light */\n  --jb-ink-800:   #181818;        /* brand black (from palette) */\n  --jb-ink-700:   #222222;        /* body text strong */\n  --jb-ink-600:   #333333;        /* body */\n  --jb-ink-500:   #666666;        /* body default (nextjs body color) */\n  --jb-ink-400:   #697282;        /* placeholder */\n  --jb-ink-300:   #858585;        /* muted */\n  --jb-ink-200:   #b9b9b9;        /* divider strong */\n  --jb-ink-150:   #dddddd;        /* border default */\n  --jb-ink-100:   #eaeaea;        /* hairline */\n  --jb-ink-75:    #f1f1f1;        /* hairline alt (nav border) */\n  --jb-ink-50:    #f5f5f7;        /* subtle surface */\n\n  /* ========== SEMANTIC TOKENS ========== */\n  --bg-page:       var(--jb-paper);\n  --bg-warm:       var(--jb-cream-50);\n  --bg-elevated:   var(--jb-paper);\n  --bg-subtle:     var(--jb-ink-50);\n  --bg-banner:     var(--jb-green-100);\n\n  --fg-default:    var(--jb-ink-500);     /* matches site body */\n  --fg-strong:     var(--jb-ink-700);\n  --fg-heading:    var(--jb-green-900);   /* deep green on hero / marketing */\n  --fg-muted:      var(--jb-ink-400);\n  --fg-inverse:    var(--jb-paper);\n  --fg-brand:      var(--jb-green-500);\n  --fg-link:       var(--jb-green-500);\n\n  --border-subtle: var(--jb-ink-75);\n  --border-default:var(--jb-ink-150);\n  --border-strong: var(--jb-ink-200);\n  --border-focus:  var(--jb-green-500);\n\n  /* Primary action */\n  --action-primary-bg:      var(--jb-green-500);\n  --action-primary-bg-hover:var(--jb-green-600);\n  --action-primary-fg:      var(--jb-paper);\n\n  /* Secondary / outline action */\n  --action-outline-fg:      var(--jb-green-500);\n  --action-outline-border:  var(--jb-green-500);\n  --action-outline-bg-hover:var(--jb-green-500);\n\n  /* Signal */\n  --signal-success-bg:     var(--jb-green-100);\n  --signal-success-fg:     var(--jb-green-900);\n  --signal-error:          var(--jb-red);\n  --signal-warning:        var(--jb-orange);\n  --signal-info:           var(--jb-blue);\n\n  /* Shadows */\n  --shadow-xs:  0 1px 2px rgba(0,0,0,.05);\n  --shadow-sm:  0 2px 8px rgba(0,0,0,.06);\n  --shadow-md:  0 6px 16px rgba(0,0,0,.08);\n  --shadow-lg:  0 12px 32px rgba(0,0,0,.12);\n  --shadow-hero:0 -2px 40px rgba(0,0,0,.15);\n\n  /* Radii */\n  --radius-xs: 4px;\n  --radius-sm: 6px;\n  --radius-md: 8px;\n  --radius-lg: 12px;           /* buttons, inputs, cards */\n  --radius-xl: 16px;\n  --radius-2xl: 24px;\n  --radius-pill: 9999px;\n\n  /* Spacing (4px scale) */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* Container widths (matches site breakpoints) */\n  --container-narrow: 1256px;\n  --container-wide:   1400px;\n  --container-max:    1920px;\n\n  /* ========== TYPE FACES ========== */\n  --font-display: \"Feather Bold\", \"Fraunces\", \"DM Serif Display\", Georgia, serif;\n  --font-sans:    \"Manrope\", \"Inter\", system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-ui:      \"Inter\", \"Manrope\", system-ui, sans-serif;\n  --font-mono:    ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* Weights */\n  --fw-regular: 400;\n  --fw-medium:  500;\n  --fw-semibold:600;\n  --fw-bold:    700;\n\n  /* Type scale — based on Figma usage frequency */\n  --fs-xs:    12px;\n  --fs-sm:    14px;   /* body S, captions */\n  --fs-base:  16px;   /* body M */\n  --fs-md:    18px;\n  --fs-lg:    20px;\n  --fs-xl:    22px;\n  --fs-2xl:   24px;   /* section heading on cards */\n  --fs-3xl:   28px;\n  --fs-4xl:   36px;\n  --fs-5xl:   48px;   /* hero H1 (desktop) */\n  --fs-6xl:   56px;\n\n  --lh-tight:  1.05;\n  --lh-snug:   1.15;\n  --lh-normal: 1.35;\n  --lh-body:   1.5;\n}\n\n/* ============================================================\n   SEMANTIC TYPOGRAPHY — use these on elements directly.\n   ============================================================ */\nhtml, body {\n  background: var(--bg-page);\n  color: var(--fg-default);\n  font-family: var(--font-sans);\n  font-size: var(--fs-base);\n  line-height: var(--lh-body);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n/* Display — Feather Bold. The hero's signature style. */\n.jb-display,\n.feather-bold-font {\n  font-family: var(--font-display);\n  font-weight: 700;\n  letter-spacing: -0.01em;\n  color: var(--fg-heading);\n}\n\n/* Display scale (Feather Bold) */\n.jb-h1 { font-family: var(--font-display); font-weight: 700; font-size: var(--fs-5xl); line-height: 56px; letter-spacing: -0.01em; }\n.jb-h2 { font-family: var(--font-display); font-weight: 700; font-size: var(--fs-4xl); line-height: 1.15; letter-spacing: -0.005em; }\n.jb-h3 { font-family: var(--font-display); font-weight: 700; font-size: var(--fs-2xl); line-height: 1.2; }\n.jb-h4 { font-family: var(--font-display); font-weight: 700; font-size: var(--fs-xl); line-height: 1.25; }\n\n/* Sans headers — Manrope Bold, used in section headers & card titles */\n.jb-section-title  { font-family: var(--font-sans); font-weight: 700; font-size: var(--fs-2xl); color: var(--jb-ink-800); }\n.jb-card-title     { font-family: var(--font-sans); font-weight: 700; font-size: var(--fs-md); color: var(--jb-ink-700); }\n.jb-eyebrow        { font-family: var(--font-sans); font-weight: 600; font-size: var(--fs-sm); text-transform: uppercase; letter-spacing: .08em; color: var(--jb-green-700); }\n\n/* Body */\n.jb-body-lg { font-family: var(--font-sans); font-weight: 400; font-size: var(--fs-md); line-height: var(--lh-body); color: var(--fg-default); }\n.jb-body    { font-family: var(--font-sans); font-weight: 400; font-size: var(--fs-base); line-height: var(--lh-body); color: var(--fg-default); }\n.jb-body-sm { font-family: var(--font-sans); font-weight: 400; font-size: var(--fs-sm); line-height: var(--lh-body); color: var(--fg-default); }\n.jb-caption { font-family: var(--font-sans); font-weight: 500; font-size: var(--fs-xs); line-height: 1.4; color: var(--fg-muted); }\n\n/* Label / UI microcopy */\n.jb-label   { font-family: var(--font-sans); font-weight: 600; font-size: var(--fs-sm); color: var(--jb-ink-700); }\n.jb-price   { font-family: var(--font-sans); font-weight: 700; font-size: var(--fs-md); color: var(--jb-ink-800); }\n\n/* Link */\n.jb-link { color: var(--fg-link); text-decoration: none; }\n.jb-link:hover { text-decoration: underline; }\n\n/* Button base reset — consume with .jb-btn--primary / .jb-btn--outline */\n.jb-btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n  height: 48px; padding: 0 24px;\n  border-radius: var(--radius-lg);\n  font-family: var(--font-sans); font-weight: 500; font-size: 16px;\n  border: none; cursor: pointer;\n  transition: all 200ms ease;\n}\n.jb-btn--primary   { background: var(--action-primary-bg); color: var(--action-primary-fg); }\n.jb-btn--primary:hover   { background: var(--action-primary-bg-hover); }\n.jb-btn--outline   { background: transparent; color: var(--action-outline-fg); border: 2px solid var(--action-outline-border); }\n.jb-btn--outline:hover   { background: var(--action-outline-bg-hover); color: var(--fg-inverse); }\n.jb-btn--pill      { border-radius: var(--radius-pill); font-weight: 700; }\n.jb-btn--sm        { height: 36px; padding: 0 16px; font-size: 14px; }\n<\u002Fstyle>\n<script src=\"cbe21354-d1e8-4100-a85c-021d5a79c34c\"><\u002Fscript>\n<style>\n  body{margin:0;background:#e7e3d8;font-family:\"Manrope\",system-ui,sans-serif}\n  a{color:#009b4d}\n  @keyframes revealIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n  @keyframes spin{to{transform:rotate(360deg)}}\n  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}\n  .esc::-webkit-scrollbar{width:0;background:transparent}\n  .esc{scrollbar-width:none}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:14px;padding:28px 16px 40px;box-sizing:border-box\">\n  <div style=\"text-align:center;max-width:420px\">\n    <div style=\"font:600 11px/1 'Manrope';letter-spacing:.13em;text-transform:uppercase;color:#156641\">Jungle · Interactive prototype<\u002Fdiv>\n    <div style=\"font:500 13px/1.5 'Manrope';color:#5f5c53;margin-top:7px\">Answer five quick questions, or load a sample child. Switch the reveal style in the Tweaks panel (cards, radar, full map).<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"width:392px;background:#141414;border-radius:46px;padding:11px;box-shadow:0 30px 70px -24px rgba(12,60,38,.55),0 8px 20px rgba(0,0,0,.14)\">\n    <div style=\"position:relative;background:#f6f4ec;border-radius:36px;overflow:hidden;height:812px\">\n      <div style=\"position:absolute;top:9px;left:50%;transform:translateX(-50%);width:96px;height:26px;background:#141414;border-radius:0 0 16px 16px;z-index:40\"><\u002Fdiv>\n\n      <!-- ===================== INTRO ===================== -->\n      <sc-if value=\"{{isIntro}}\" hint-placeholder-val=\"{{true}}\">\n        <div class=\"esc\" style=\"height:100%;overflow-y:auto\">\n          <div style=\"position:relative;height:420px\">\n            <img src=\"d877254f-cdcc-48fb-a99d-8db21159c48f\" alt=\"\" style=\"width:100%;height:100%;object-fit:cover;object-position:50% 30%\">\n            <div style=\"position:absolute;inset:0;background:linear-gradient(to top,#f6f4ec 3%,rgba(246,244,236,.1) 40%,rgba(12,60,38,.28) 100%)\"><\u002Fdiv>\n            <img src=\"3e4d3d94-cb59-4e18-8d75-c25a4334798f\" alt=\"Jungle\" style=\"position:absolute;top:52px;left:50%;transform:translateX(-50%);height:22px\">\n          <\u002Fdiv>\n          <div style=\"padding:4px 28px 28px;margin-top:-40px;position:relative\">\n            <div style=\"font:600 11px/1 'Manrope';letter-spacing:.13em;text-transform:uppercase;color:#156641\">The Explorer Map<\u002Fdiv>\n            <h1 style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:34px;line-height:1.06;letter-spacing:-.01em;margin:12px 0 0\">See the shape of how your child plays<\u002Fh1>\n            <p style=\"font:400 14.5px/1.55 'Manrope';color:#5b5b5b;margin:14px 0 0\">Four ways children grow, mapped from what they have already tried and what they love. Not a test. Not a score. A celebration, with a few good ideas for what to explore next.<\u002Fp>\n            <button onclick=\"{{start}}\" style=\"width:100%;margin-top:26px;height:52px;border:none;border-radius:14px;background:#009b4d;color:#fff;font:700 15px 'Manrope';cursor:pointer\">Start exploring<\u002Fbutton>\n            <button onclick=\"{{loadSample}}\" style=\"width:100%;margin-top:11px;height:50px;border:2px solid #009b4d;border-radius:14px;background:transparent;color:#009b4d;font:700 14px 'Manrope';cursor:pointer\">See a sample child (Amara)<\u002Fbutton>\n            <button onclick=\"{{openFw}}\" style=\"width:100%;margin-top:14px;padding:13px;border:none;border-radius:12px;background:#eef3ef;color:#0c3c26;font:700 13px 'Manrope';cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z\"><\u002Fpath><path d=\"M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z\"><\u002Fpath><\u002Fsvg>How the Jungle framework works<\u002Fbutton>\n            <div style=\"text-align:center;margin-top:18px;font:500 11.5px/1.4 'Manrope';color:#9a9a9a\">We map experiences, never your child.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== QUESTION SHELL PARTS via screens ===================== -->\n      <!-- SETUP -->\n      <sc-if value=\"{{isSetup}}\" hint-placeholder-val=\"{{true}}\">\n        <div class=\"esc\" style=\"height:100%;overflow-y:auto;padding:52px 26px 28px;box-sizing:border-box\">\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div onclick=\"{{back}}\" style=\"width:36px;height:36px;border-radius:999px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;color:#181818;cursor:pointer\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1;height:6px;border-radius:99px;background:#e7e3d6;overflow:hidden\"><div style=\"height:100%;border-radius:99px;background:#009b4d;width:{{stepPct}}\"><\u002Fdiv><\u002Fdiv>\n            <span style=\"font:600 11px/1 'Manrope';color:#8a8a8a;white-space:nowrap\">{{stepLabel}}<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:27px;line-height:1.1;margin:24px 0 6px\">{{setupTitle}}<\u002Fh2>\n          <p style=\"font:400 13.5px/1.5 'Manrope';color:#6a6a6a;margin:0 0 22px\">{{setupSub}}<\u002Fp>\n          <label style=\"font:700 12px 'Manrope';color:#3a3a3a;display:block;margin-bottom:7px\">Child's name<\u002Flabel>\n          <input value=\"{{nameVal}}\" onchange=\"{{onName}}\" placeholder=\"e.g. Amara\" style=\"width:100%;box-sizing:border-box;height:50px;border:1.5px solid #ddd;border-radius:12px;padding:0 15px;font:500 15px 'Manrope';color:#181818;background:#fff;outline:none\">\n          <label style=\"font:700 12px 'Manrope';color:#3a3a3a;display:block;margin:18px 0 7px\">Age<\u002Flabel>\n          <input value=\"{{ageVal}}\" onchange=\"{{onAge}}\" placeholder=\"e.g. 5\" style=\"width:100%;box-sizing:border-box;height:50px;border:1.5px solid #ddd;border-radius:12px;padding:0 15px;font:500 15px 'Manrope';color:#181818;background:#fff;outline:none\">\n          <label style=\"font:700 12px 'Manrope';color:#3a3a3a;display:block;margin:18px 0 9px\">Neighbourhood<\u002Flabel>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n            <sc-for list=\"{{hoodChips}}\" as=\"h\" hint-placeholder-count=\"5\"><button onclick=\"{{h.onClick}}\" style=\"{{h.style}}\">{{h.label}}<\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{next}}\" style=\"width:100%;margin-top:30px;height:52px;border:none;border-radius:14px;background:#009b4d;color:#fff;font:700 15px 'Manrope';cursor:pointer\">Continue<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- TRIED -->\n      <sc-if value=\"{{isTried}}\" hint-placeholder-val=\"{{true}}\">\n        <div class=\"esc\" style=\"height:100%;overflow-y:auto;padding:52px 26px 28px;box-sizing:border-box\">\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div onclick=\"{{back}}\" style=\"width:36px;height:36px;border-radius:999px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;color:#181818;cursor:pointer\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1;height:6px;border-radius:99px;background:#e7e3d6;overflow:hidden\"><div style=\"height:100%;border-radius:99px;background:#009b4d;width:{{stepPct}}\"><\u002Fdiv><\u002Fdiv>\n            <span style=\"font:600 11px/1 'Manrope';color:#8a8a8a;white-space:nowrap\">{{stepLabel}}<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:27px;line-height:1.1;margin:24px 0 6px\">{{triedTitle}}<\u002Fh2>\n          <p style=\"font:400 13.5px/1.5 'Manrope';color:#6a6a6a;margin:0 0 20px\">{{triedSub}}<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:9px\">\n            <sc-for list=\"{{q1chips}}\" as=\"c\" hint-placeholder-count=\"13\"><button onclick=\"{{c.onClick}}\" style=\"{{c.style}}\">{{c.label}}<\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{next}}\" style=\"width:100%;margin-top:28px;height:52px;border:none;border-radius:14px;background:#009b4d;color:#fff;font:700 15px 'Manrope';cursor:pointer\">Continue<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- FREQ -->\n      <sc-if value=\"{{isFreq}}\" hint-placeholder-val=\"{{true}}\">\n        <div class=\"esc\" style=\"height:100%;overflow-y:auto;padding:52px 26px 28px;box-sizing:border-box\">\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div onclick=\"{{back}}\" style=\"width:36px;height:36px;border-radius:999px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;color:#181818;cursor:pointer\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1;height:6px;border-radius:99px;background:#e7e3d6;overflow:hidden\"><div style=\"height:100%;border-radius:99px;background:#009b4d;width:{{stepPct}}\"><\u002Fdiv><\u002Fdiv>\n            <span style=\"font:600 11px/1 'Manrope';color:#8a8a8a;white-space:nowrap\">{{stepLabel}}<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:27px;line-height:1.1;margin:24px 0 6px\">{{freqTitle}}<\u002Fh2>\n          <p style=\"font:400 13.5px/1.5 'Manrope';color:#6a6a6a;margin:0 0 20px\">{{freqSub}}<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{freqOpts}}\" as=\"o\" hint-placeholder-count=\"3\"><button onclick=\"{{o.onClick}}\" style=\"{{o.style}}\"><span style=\"font:700 15px 'Manrope';color:#181818\">{{o.label}}<\u002Fspan><span style=\"font:500 12.5px 'Manrope';color:#7a7a7a;margin-top:3px\">{{o.desc}}<\u002Fspan><\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{next}}\" style=\"width:100%;margin-top:28px;height:52px;border:none;border-radius:14px;background:#009b4d;color:#fff;font:700 15px 'Manrope';cursor:pointer\">Continue<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- LEANS -->\n      <sc-if value=\"{{isLeans}}\" hint-placeholder-val=\"{{true}}\">\n        <div class=\"esc\" style=\"height:100%;overflow-y:auto;padding:52px 26px 28px;box-sizing:border-box\">\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div onclick=\"{{back}}\" style=\"width:36px;height:36px;border-radius:999px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;color:#181818;cursor:pointer\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1;height:6px;border-radius:99px;background:#e7e3d6;overflow:hidden\"><div style=\"height:100%;border-radius:99px;background:#009b4d;width:{{stepPct}}\"><\u002Fdiv><\u002Fdiv>\n            <span style=\"font:600 11px/1 'Manrope';color:#8a8a8a;white-space:nowrap\">{{stepLabel}}<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:27px;line-height:1.1;margin:24px 0 6px\">{{leansTitle}}<\u002Fh2>\n          <p style=\"font:400 13.5px/1.5 'Manrope';color:#6a6a6a;margin:0 0 20px\">{{leansSub}}<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{leanOpts}}\" as=\"o\" hint-placeholder-count=\"4\"><button onclick=\"{{o.onClick}}\" style=\"{{o.style}}\"><span style=\"width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none;background:{{o.soft}};color:{{o.color}}\">{{o.icon}}<\u002Fspan><span style=\"font:700 14.5px 'Manrope';color:#181818\">{{o.label}}<\u002Fspan><\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{next}}\" style=\"width:100%;margin-top:28px;height:52px;border:none;border-radius:14px;background:#009b4d;color:#fff;font:700 15px 'Manrope';cursor:pointer\">Continue<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- INTENT -->\n      <sc-if value=\"{{isIntent}}\" hint-placeholder-val=\"{{true}}\">\n        <div class=\"esc\" style=\"height:100%;overflow-y:auto;padding:52px 26px 28px;box-sizing:border-box\">\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div onclick=\"{{back}}\" style=\"width:36px;height:36px;border-radius:999px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;color:#181818;cursor:pointer\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1;height:6px;border-radius:99px;background:#e7e3d6;overflow:hidden\"><div style=\"height:100%;border-radius:99px;background:#009b4d;width:{{stepPct}}\"><\u002Fdiv><\u002Fdiv>\n            <span style=\"font:600 11px/1 'Manrope';color:#8a8a8a;white-space:nowrap\">{{stepLabel}}<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:27px;line-height:1.1;margin:24px 0 6px\">{{intentTitle}}<\u002Fh2>\n          <p style=\"font:400 13.5px/1.5 'Manrope';color:#6a6a6a;margin:0 0 20px\">{{intentSub}}<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{intentOpts}}\" as=\"o\" hint-placeholder-count=\"3\"><button onclick=\"{{o.onClick}}\" style=\"{{o.style}}\"><span style=\"font:700 15px 'Manrope';color:#181818\">{{o.label}}<\u002Fspan><span style=\"font:500 12.5px 'Manrope';color:#7a7a7a;margin-top:3px\">{{o.desc}}<\u002Fspan><\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{next}}\" style=\"width:100%;margin-top:28px;height:52px;border:none;border-radius:14px;background:#009b4d;color:#fff;font:700 15px 'Manrope';cursor:pointer\">Build the map<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- BUILDING -->\n      <sc-if value=\"{{isBuilding}}\" hint-placeholder-val=\"{{true}}\">\n        <div style=\"height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 40px;text-align:center\">\n          <svg width=\"64\" height=\"64\" sc-camel-view-box=\"0 0 50 50\" style=\"animation:spin 1.1s linear infinite\"><circle cx=\"25\" cy=\"25\" r=\"20\" fill=\"none\" stroke=\"#e0ddd0\" stroke-width=\"5\"><\u002Fcircle><path d=\"M25 5 a20 20 0 0 1 20 20\" fill=\"none\" stroke=\"#009b4d\" stroke-width=\"5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <div style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:22px;margin-top:24px\">Mapping {{childName}}'s trails<\u002Fdiv>\n          <div style=\"font:500 13px 'Manrope';color:#7a7a7a;margin-top:8px\">Matching experiences to the four ways children grow.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== FRAMEWORK ===================== -->\n      <sc-if value=\"{{isFramework}}\">\n        <div class=\"esc\" style=\"height:100%;overflow-y:auto\">\n          <div style=\"position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:44px 20px 12px;background:linear-gradient(#f6f4ec 74%,rgba(246,244,236,0))\">\n            <div onclick=\"{{closeFw}}\" style=\"width:36px;height:36px;border-radius:999px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;color:#181818;cursor:pointer\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"font:700 14px 'Manrope';color:#0c3c26\">How the framework works<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- STORY -->\n          <sc-if value=\"{{fwStory}}\" hint-placeholder-val=\"{{true}}\">\n            <div style=\"padding:2px 22px 26px\">\n              <div style=\"position:relative;border-radius:22px;overflow:hidden;height:172px;margin-bottom:20px\">\n                <img src=\"f7f34906-8f1f-48b7-81a2-024aaf269851\" alt=\"\" style=\"width:100%;height:100%;object-fit:cover;object-position:50% 32%\">\n                <div style=\"position:absolute;inset:0;background:linear-gradient(to top,rgba(12,60,38,.82),rgba(12,60,38,.05) 70%)\"><\u002Fdiv>\n                <div style=\"position:absolute;left:18px;right:18px;bottom:15px\">\n                  <div style=\"font:600 10.5px/1 'Manrope';letter-spacing:.13em;text-transform:uppercase;color:#a7e3c3\">Four trails, one child<\u002Fdiv>\n                  <div style=\"font-family:'Feather Bold',serif;color:#fff;font-size:25px;line-height:1.05;margin-top:6px\">How we map the way children grow<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"font:400 14.5px/1.6 'Manrope';color:#4f4f4f;margin:0\">Every child explores the world in their own way. We sort the thousands of activities across Singapore into four simple trails, so you can see the shape of how your child plays, and spot the ground still waiting to be discovered.<\u002Fp>\n              <div style=\"margin:20px 0;padding:17px 18px;background:#0c3c26;border-radius:18px\">\n                <div style=\"font:600 10.5px/1 'Manrope';letter-spacing:.12em;text-transform:uppercase;color:#8fd3ad\">How we built it<\u002Fdiv>\n                <p style=\"font:400 13px/1.6 'Manrope';color:#e6efe9;margin:9px 0 0\">We worked with early-childhood educators to map hundreds of classes, camps and outings against four well-loved areas of child development. Then we pressure-tested it with parents and teachers across the island. It is a compass for exploring, never a report card.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:13px\">\n                <sc-for list=\"{{fwTrails}}\" as=\"t\" hint-placeholder-count=\"4\">\n                  <div style=\"{{t.storyStyle}}\">\n                    <div style=\"display:flex;align-items:center;gap:13px\">\n                      <div style=\"{{t.iconBox}}\">{{t.icon}}<\u002Fdiv>\n                      <div><div style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:20px;line-height:1\">{{t.plain}}<\u002Fdiv><div style=\"font:600 11.5px 'Manrope';color:{{t.dark}};margin-top:4px\">{{t.theme}}<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                    <p style=\"font:400 13px/1.55 'Manrope';color:#5b5b5b;margin:13px 0 0\">{{t.def}}<\u002Fp>\n                    <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:13px\"><sc-for list=\"{{t.examples}}\" as=\"e\" hint-placeholder-count=\"4\"><span style=\"{{e.style}}\">{{e.label}}<\u002Fspan><\u002Fsc-for><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"text-align:center;margin-top:22px;font:500 11px/1.4 'Manrope';color:#9a9a9a\">We map experiences, never your child.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- CARDS -->\n          <sc-if value=\"{{fwCards}}\">\n            <div style=\"padding:2px 20px 26px\">\n              <div style=\"font:600 10.5px/1 'Manrope';letter-spacing:.13em;text-transform:uppercase;color:#156641\">The Jungle framework<\u002Fdiv>\n              <h2 style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:26px;line-height:1.08;margin:9px 0 0\">How we map the way children grow<\u002Fh2>\n              <p style=\"font:400 13.5px/1.55 'Manrope';color:#6a6a6a;margin:11px 0 0\">Four simple trails sit behind every idea we share.<\u002Fp>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:18px\">\n                <sc-for list=\"{{fwTrails}}\" as=\"t\" hint-placeholder-count=\"4\">\n                  <div style=\"{{t.cardStyle}}\">\n                    <div style=\"{{t.iconBox}}\">{{t.icon}}<\u002Fdiv>\n                    <div style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:18px;line-height:1;margin-top:12px\">{{t.plain}}<\u002Fdiv>\n                    <div style=\"font:600 10.5px 'Manrope';color:{{t.dark}};margin-top:5px\">{{t.theme}}<\u002Fdiv>\n                    <p style=\"font:400 12px/1.5 'Manrope';color:#6a6a6a;margin:10px 0 0\">{{t.def}}<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"margin-top:16px;padding:17px 18px;background:#0c3c26;border-radius:18px\">\n                <div style=\"font:600 10.5px/1 'Manrope';letter-spacing:.12em;text-transform:uppercase;color:#8fd3ad\">How we built it<\u002Fdiv>\n                <p style=\"font:400 13px/1.6 'Manrope';color:#e6efe9;margin:9px 0 0\">Built with early-childhood educators, mapped across hundreds of Singapore activities, then pressure-tested with parents and teachers. A compass for exploring, never a report card.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ACCORDION -->\n          <sc-if value=\"{{fwAccordion}}\">\n            <div style=\"padding:2px 20px 26px\">\n              <div style=\"font:600 10.5px/1 'Manrope';letter-spacing:.13em;text-transform:uppercase;color:#156641\">The Jungle framework<\u002Fdiv>\n              <h2 style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:26px;line-height:1.08;margin:9px 0 0\">How we map the way children grow<\u002Fh2>\n              <p style=\"font:400 13.5px/1.55 'Manrope';color:#6a6a6a;margin:11px 0 16px\">Four simple trails sit behind every idea we share. Tap one to explore.<\u002Fp>\n              <div style=\"padding:15px 16px;background:#eef3ef;border-radius:16px;margin-bottom:14px\">\n                <div style=\"font:600 10.5px/1 'Manrope';letter-spacing:.12em;text-transform:uppercase;color:#156641\">How we built it<\u002Fdiv>\n                <p style=\"font:400 12.5px/1.55 'Manrope';color:#4f6f5c;margin:8px 0 0\">Built with early-childhood educators and mapped across hundreds of Singapore activities. A compass for exploring, never a report card.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <sc-for list=\"{{fwTrails}}\" as=\"t\" hint-placeholder-count=\"4\">\n                  <div>\n                    <div onclick=\"{{t.onToggle}}\" style=\"{{t.accHeadStyle}}\">\n                      <div style=\"{{t.iconBox}}\">{{t.iconSm}}<\u002Fdiv>\n                      <div style=\"flex:1;min-width:0\"><div style=\"font:700 15px/1.1 'Manrope';color:#181818\">{{t.plain}}<\u002Fdiv><div style=\"font:600 11px 'Manrope';color:{{t.dark}};margin-top:3px\">{{t.theme}}<\u002Fdiv><\u002Fdiv>\n                      <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"{{t.chevStyle}}\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fdiv>\n                    <sc-if value=\"{{t.open}}\">\n                      <div style=\"padding:14px 16px 4px\">\n                        <p style=\"font:400 13px/1.55 'Manrope';color:#5b5b5b;margin:0 0 12px\">{{t.def}}<\u002Fp>\n                        <div style=\"display:flex;flex-wrap:wrap;gap:6px\"><sc-for list=\"{{t.examples}}\" as=\"e\" hint-placeholder-count=\"4\"><span style=\"{{e.style}}\">{{e.label}}<\u002Fspan><\u002Fsc-for><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- COMPASS -->\n          <sc-if value=\"{{fwCompass}}\">\n            <div style=\"padding:2px 20px 26px\">\n              <div style=\"font:600 10.5px/1 'Manrope';letter-spacing:.13em;text-transform:uppercase;color:#156641\">The Jungle framework<\u002Fdiv>\n              <h2 style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:26px;line-height:1.08;margin:9px 0 0\">How we map the way children grow<\u002Fh2>\n              <p style=\"font:400 13.5px/1.55 'Manrope';color:#6a6a6a;margin:11px 0 0\">Four simple trails sit behind every idea we share. Tap a trail to explore it.<\u002Fp>\n              <div style=\"display:flex;justify-content:center;margin:16px 0 4px\">\n                <svg width=\"260\" height=\"260\" sc-camel-view-box=\"0 0 260 260\">\n                  <sc-for list=\"{{compassWedges}}\" as=\"w\" hint-placeholder-count=\"4\"><path d=\"{{w.d}}\" fill=\"{{w.fill}}\" stroke=\"#ffffff\" stroke-width=\"2\" sc-camel-on-click=\"{{w.onClick}}\" style=\"cursor:pointer\"><\u002Fpath><\u002Fsc-for>\n                  <sc-for list=\"{{compassWedges}}\" as=\"w\" hint-placeholder-count=\"4\"><text x=\"{{w.lx}}\" y=\"{{w.ly}}\" text-anchor=\"middle\" font-family=\"Manrope,sans-serif\" font-size=\"12\" font-weight=\"700\" fill=\"{{w.txcol}}\" style=\"pointer-events:none\">{{w.plain}}<\u002Ftext><\u002Fsc-for>\n                  <circle cx=\"130\" cy=\"130\" r=\"33\" fill=\"#0c3c26\"><\u002Fcircle>\n                  <text x=\"130\" y=\"127\" text-anchor=\"middle\" font-family=\"Manrope,sans-serif\" font-size=\"9.5\" font-weight=\"700\" letter-spacing=\"1\" fill=\"#8fd3ad\">JUNGLE<\u002Ftext>\n                  <text x=\"130\" y=\"140\" text-anchor=\"middle\" font-family=\"Manrope,sans-serif\" font-size=\"8.5\" font-weight=\"600\" fill=\"#e6efe9\">4 trails<\u002Ftext>\n                <\u002Fsvg>\n              <\u002Fdiv>\n              <sc-if value=\"{{compassSel}}\">\n                <div style=\"margin-top:4px\">\n                  <div style=\"{{compassSel.storyStyle}}\">\n                    <div style=\"display:flex;align-items:center;gap:13px\">\n                      <div style=\"{{compassSel.iconBox}}\">{{compassSel.icon}}<\u002Fdiv>\n                      <div><div style=\"font-family:'Feather Bold',serif;color:#0c3c26;font-size:19px;line-height:1\">{{compassSel.plain}}<\u002Fdiv><div style=\"font:600 11.5px 'Manrope';color:{{compassSel.dark}};margin-top:4px\">{{compassSel.theme}}<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                    <p style=\"font:400 13px/1.55 'Manrope';color:#5b5b5b;margin:13px 0 0\">{{compassSel.def}}<\u002Fp>\n                    <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:13px\"><sc-for list=\"{{compassSel.examples}}\" as=\"e\" hint-placeholder-count=\"4\"><span style=\"{{e.style}}\">{{e.label}}<\u002Fspan><\u002Fsc-for><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{compassNone}}\" hint-placeholder-val=\"{{true}}\">\n                <div style=\"text-align:center;padding:16px;font:500 12.5px 'Manrope';color:#9a9a9a\">Tap a trail to see what it means and the activities inside it.<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"margin-top:16px;padding:15px 16px;background:#eef3ef;border-radius:16px\">\n                <div style=\"font:600 10.5px/1 'Manrope';letter-spacing:.12em;text-transform:uppercase;color:#156641\">How we built it<\u002Fdiv>\n                <p style=\"font:400 12.5px/1.55 'Manrope';color:#4f6f5c;margin:8px 0 0\">Built with early-childhood educators and mapped across hundreds of Singapore activities. A compass for exploring, never a report card.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== REVEAL ===================== -->\n      <sc-if value=\"{{isReveal}}\">\n        <div class=\"esc\" style=\"height:100%;overflow-y:auto\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:44px 20px 12px\">\n            <div onclick=\"{{restart}}\" style=\"width:36px;height:36px;border-radius:999px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;color:#181818;cursor:pointer\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <img src=\"3e4d3d94-cb59-4e18-8d75-c25a4334798f\" alt=\"Jungle\" style=\"height:19px;width:auto\">\n            <div style=\"width:36px;height:36px;border-radius:999px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;color:#181818\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8\"><\u002Fpath><path d=\"M16 6l-4-4-4 4\"><\u002Fpath><path d=\"M12 2v13\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:relative;margin:6px 16px 0;border-radius:22px;overflow:hidden;height:184px\">\n            <img src=\"82da7e3e-ae0b-47df-aff1-813f856dc33f\" alt=\"\" style=\"width:100%;height:100%;object-fit:cover;object-position:50% 22%\">\n            <div style=\"position:absolute;inset:0;background:linear-gradient(to top,rgba(12,60,38,.82) 0%,rgba(12,60,38,.15) 52%,rgba(12,60,38,0) 76%)\"><\u002Fdiv>\n            <div style=\"position:absolute;left:18px;right:18px;bottom:15px;color:#fff\">\n              <div style=\"font:600 11px/1 'Manrope';letter-spacing:.13em;text-transform:uppercase;color:#a7e3c3\">Your explorer<\u002Fdiv>\n              <div style=\"font-family:'Feather Bold',serif;font-size:27px;line-height:1.05;margin-top:6px\">{{childHeading}}<\u002Fdiv>\n              <div style=\"font:500 12.5px/1 'Manrope';color:rgba(255,255,255,.82);margin-top:6px\">{{hoodVal}}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:18px 20px 2px\">\n            <div style=\"font:600 11px/1 'Manrope';letter-spacing:.12em;text-transform:uppercase;color:#156641\">Where {{childName}} loves to go<\u002Fdiv>\n            <p style=\"font:400 13.5px/1.55 'Manrope';color:#5b5b5b;margin:9px 0 0\">{{summaryLine}}<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- viz switcher -->\n          <div style=\"margin:16px 20px 4px;display:flex;gap:5px;background:#eceae1;border-radius:12px;padding:4px\">\n            <button onclick=\"{{setCards}}\" style=\"{{segCards}}\">Cards<\u002Fbutton>\n            <button onclick=\"{{setRadar}}\" style=\"{{segRadar}}\">Radar<\u002Fbutton>\n            <button onclick=\"{{setFull}}\" style=\"{{segFull}}\">Full map<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"{{vizAnimStyle}}\">\n          <!-- CARDS -->\n          <sc-if value=\"{{vizCards}}\" hint-placeholder-val=\"{{true}}\">\n            <div style=\"padding:12px 16px 4px;display:flex;flex-direction:column;gap:11px\">\n              <sc-for list=\"{{coverage}}\" as=\"c\" hint-placeholder-count=\"4\">\n                <div style=\"{{c.cardStyle}}\">\n                  <div style=\"display:flex;align-items:center;gap:12px\">\n                    <div style=\"{{c.iconBox}}\">{{c.icon}}<\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\">\n                      <div style=\"font:700 16px/1.15 'Manrope';color:#181818\">{{c.plain}}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"{{c.levelChip}}\">{{c.level}}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:5px;margin:13px 0 12px\">\n                    <sc-for list=\"{{c.pips}}\" as=\"p\" hint-placeholder-count=\"4\"><div style=\"{{p.style}}\"><\u002Fdiv><\u002Fsc-for>\n                  <\u002Fdiv>\n                  <p style=\"font:500 12.5px/1.5 'Manrope';color:#6a6a6a;margin:0 0 13px\">{{c.def}}<\u002Fp>\n                  <div style=\"font:700 10px/1 'Manrope';letter-spacing:.09em;text-transform:uppercase;color:#a7a08f;margin-bottom:9px\">In this trail<\u002Fdiv>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n                    <sc-for list=\"{{c.cats}}\" as=\"cat\" hint-placeholder-count=\"4\"><span style=\"{{cat.style}}\">{{cat.label}}<\u002Fspan><\u002Fsc-for>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{c.isSocial}}\"><p style=\"font:500 12px/1.5 'Manrope';color:#7a7a7a;margin:12px 0 0;font-style:italic\">{{c.socialNote}}<\u002Fp><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- RADAR (4 trail) -->\n          <sc-if value=\"{{vizRadar}}\" hint-placeholder-val=\"{{true}}\">\n            <div style=\"padding:6px 16px 6px\">\n              <div style=\"display:flex;justify-content:center\">\n                <svg width=\"320\" height=\"300\" sc-camel-view-box=\"-12 0 344 300\">\n                  <path d=\"M160,150 L160,40 L270,150 Z\" fill=\"#dff0e7\"><\u002Fpath>\n                  <path d=\"M160,150 L270,150 L160,260 Z\" fill=\"#fbf1cf\"><\u002Fpath>\n                  <path d=\"M160,150 L160,260 L50,150 Z\" fill=\"#dcecfb\"><\u002Fpath>\n                  <path d=\"M160,150 L50,150 L160,40 Z\" fill=\"#f2e5ef\"><\u002Fpath>\n                  <g fill=\"none\" stroke=\"#cfc9ba\" stroke-width=\"1.3\">\n                    <polygon points=\"160,128 182,150 160,172 138,150\"><\u002Fpolygon>\n                    <polygon points=\"160,106 204,150 160,194 116,150\"><\u002Fpolygon>\n                    <polygon points=\"160,84 226,150 160,216 94,150\"><\u002Fpolygon>\n                    <polygon points=\"160,62 248,150 160,238 72,150\"><\u002Fpolygon>\n                    <polygon points=\"160,40 270,150 160,260 50,150\"><\u002Fpolygon>\n                  <\u002Fg>\n                  <g stroke=\"#cfc9ba\" stroke-width=\"1.3\"><line x1=\"160\" y1=\"150\" x2=\"160\" y2=\"40\"><\u002Fline><line x1=\"160\" y1=\"150\" x2=\"270\" y2=\"150\"><\u002Fline><line x1=\"160\" y1=\"150\" x2=\"160\" y2=\"260\"><\u002Fline><line x1=\"160\" y1=\"150\" x2=\"50\" y2=\"150\"><\u002Fline><\u002Fg>\n                  <g font-family=\"Manrope,sans-serif\" font-size=\"8.5\" font-weight=\"600\" fill=\"#a7a08f\"><text x=\"165\" y=\"130\">2<\u002Ftext><text x=\"165\" y=\"108\">4<\u002Ftext><text x=\"165\" y=\"86\">6<\u002Ftext><text x=\"165\" y=\"64\">8<\u002Ftext><text x=\"165\" y=\"45\">10<\u002Ftext><\u002Fg>\n                  <polygon points=\"{{radarPoly}}\" fill=\"rgba(12,60,38,.14)\" stroke=\"#0c3c26\" stroke-width=\"2.5\" stroke-linejoin=\"round\"><\u002Fpolygon>\n                  <sc-for list=\"{{radarDots}}\" as=\"d\" hint-placeholder-count=\"4\"><circle cx=\"{{d.cx}}\" cy=\"{{d.cy}}\" r=\"5.5\" fill=\"{{d.fill}}\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle><\u002Fsc-for>\n                  <text x=\"160\" y=\"30\" text-anchor=\"middle\" font-family=\"Manrope,sans-serif\" font-size=\"12\" font-weight=\"700\" fill=\"#0c7a41\">Physical<\u002Ftext>\n                  <text x=\"276\" y=\"153\" text-anchor=\"start\" font-family=\"Manrope,sans-serif\" font-size=\"11.5\" font-weight=\"700\" fill=\"#a9820a\">Creative<\u002Ftext>\n                  <text x=\"160\" y=\"282\" text-anchor=\"middle\" font-family=\"Manrope,sans-serif\" font-size=\"12\" font-weight=\"700\" fill=\"#0b6fb0\">Cognitive<\u002Ftext>\n                  <text x=\"42\" y=\"153\" text-anchor=\"end\" font-family=\"Manrope,sans-serif\" font-size=\"12\" font-weight=\"700\" fill=\"#8a4a7b\">Social<\u002Ftext>\n                <\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"padding:0 4px;display:grid;grid-template-columns:1fr 1fr;gap:9px\">\n                <sc-for list=\"{{coverage}}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <div style=\"{{c.legendStyle}}\"><div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:9px;height:9px;border-radius:99px;background:{{c.color}}\"><\u002Fspan><span style=\"font:700 12.5px/1.1 'Manrope';color:#181818\">{{c.plain}}<\u002Fspan><\u002Fdiv><div style=\"font:600 11px/1 'Manrope';color:{{c.dark}};margin-top:6px\">{{c.level}}<\u002Fdiv><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- FULL MAP (13 spokes) -->\n          <sc-if value=\"{{vizFull}}\" hint-placeholder-val=\"{{true}}\">\n            <div style=\"padding:2px 12px 6px\">\n              <div style=\"display:flex;justify-content:center\">\n                <svg sc-camel-view-box=\"0 0 500 500\" width=\"356\" height=\"356\">\n                  <sc-for list=\"{{wedges}}\" as=\"w\" hint-placeholder-count=\"4\"><path d=\"{{w.d}}\" fill=\"{{w.fill}}\" opacity=\"0.6\"><\u002Fpath><\u002Fsc-for>\n                  <sc-for list=\"{{rings}}\" as=\"rp\" hint-placeholder-count=\"4\"><polygon points=\"{{rp}}\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"1.6\"><\u002Fpolygon><\u002Fsc-for>\n                  <sc-for list=\"{{spokes}}\" as=\"s\" hint-placeholder-count=\"13\"><line x1=\"{{s.x1}}\" y1=\"{{s.y1}}\" x2=\"{{s.x2}}\" y2=\"{{s.y2}}\" stroke=\"#ffffff\" stroke-width=\"1.3\"><\u002Fline><\u002Fsc-for>\n                  <polygon points=\"{{fullPoly}}\" fill=\"rgba(12,60,38,.15)\" stroke=\"#0c3c26\" stroke-width=\"2.5\" stroke-linejoin=\"round\"><\u002Fpolygon>\n                  <sc-for list=\"{{fullPts}}\" as=\"p\" hint-placeholder-count=\"13\"><circle cx=\"{{p.px}}\" cy=\"{{p.py}}\" r=\"4.6\" fill=\"{{p.color}}\" stroke=\"#ffffff\" stroke-width=\"1.5\"><\u002Fcircle><\u002Fsc-for>\n                  <sc-for list=\"{{fullPts}}\" as=\"p\" hint-placeholder-count=\"13\"><text x=\"{{p.lx}}\" y=\"{{p.ly}}\" text-anchor=\"{{p.anchor}}\" font-family=\"Manrope,sans-serif\" font-size=\"13.5\" font-weight=\"600\" fill=\"#40403a\">{{p.name}}<\u002Ftext><\u002Fsc-for>\n                <\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center;margin-top:2px\">\n                <sc-for list=\"{{coverage}}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:11px;height:11px;border-radius:3px;background:{{c.soft}};border:1px solid {{c.color}}\"><\u002Fspan><span style=\"font:700 11.5px 'Manrope';color:{{c.dark}}\">{{c.plain}}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- worth trying next -->\n          <div style=\"margin:16px 12px 0;padding:16px;background:#0c3c26;border-radius:22px 22px 30px 30px\">\n            <div style=\"font:600 11px/1 'Manrope';letter-spacing:.1em;text-transform:uppercase;color:#8fd3ad\">{{recEyebrow}}<\u002Fdiv>\n            <div style=\"display:flex;gap:12px;align-items:center;margin-top:12px;background:rgba(255,255,255,.06);border-radius:14px;padding:9px\">\n              {{recImgEl}}\n              <div style=\"flex:1;min-width:0\"><div style=\"font:700 13.5px/1.2 'Manrope';color:#fff\">{{recTitle}}<\u002Fdiv><div style=\"font:500 11.5px/1.3 'Manrope';color:#bfe0cd;margin-top:4px\">{{recMeta}}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <button style=\"width:100%;margin-top:12px;height:46px;border:none;border-radius:12px;background:#fff;color:#009b4d;font:700 14px 'Manrope';cursor:pointer\">See what's worth trying next<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"margin:14px 12px 0;padding:16px;background:#fff;border:1px solid #eeece3;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;gap:13px;align-items:center\">\n            <div style=\"width:44px;height:44px;border-radius:13px;background:#e5f5ed;color:#0c7a41;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z\"><\u002Fpath><path d=\"M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"font:700 14px/1.15 'Manrope';color:#0c3c26\">How the Jungle framework works<\u002Fdiv>\n              <div style=\"font:500 12px/1.4 'Manrope';color:#6a6a6a;margin-top:3px\">See how these four trails came to be.<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{openFw}}\" style=\"flex:none;padding:9px 14px;border:2px solid #009b4d;border-radius:10px;background:transparent;color:#009b4d;font:700 12.5px 'Manrope';cursor:pointer\">Read<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"text-align:center;padding:14px 20px 8px\"><span onclick=\"{{restart}}\" style=\"font:700 12.5px 'Manrope';color:#009b4d;cursor:pointer;text-decoration:underline\">Start over<\u002Fspan><\u002Fdiv>\n          <div style=\"text-align:center;padding:2px 20px 20px;font:500 11px/1.4 'Manrope';color:#9a9a9a\">We map experiences, never your child.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:900},&quot;questionSet&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;warm&quot;,&quot;playful&quot;,&quot;direct&quot;],&quot;default&quot;:&quot;warm&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Questions&quot;},&quot;vizStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;cards&quot;,&quot;radar&quot;,&quot;full&quot;],&quot;default&quot;:&quot;cards&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Reveal&quot;},&quot;previewReveal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Reveal&quot;},&quot;animateReveal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Reveal&quot;},&quot;frameworkStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;story&quot;,&quot;cards&quot;,&quot;accordion&quot;,&quot;compass&quot;],&quot;default&quot;:&quot;story&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Framework&quot;},&quot;previewFramework&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Framework&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen:'intro', name:'', age:'', hood:'East Coast', tried:{}, freq:'', leans:{}, intent:'', viz:null, fwOpen:null, fwReturn:'intro' };\n\n  componentDidMount(){ if(this.props.previewReveal) this.loadSample(); if(this.props.previewFramework) this.setState({screen:'framework',fwReturn:'intro'}); }\n  componentDidUpdate(prev){ if(this.props.previewReveal && !prev.previewReveal && this.state.screen!=='reveal') this.loadSample(); if(this.props.previewFramework && !prev.previewFramework) this.setState({screen:'framework',fwReturn:'intro'}); }\n  componentWillUnmount(){ if(this._t) clearTimeout(this._t); }\n\n  go(s){ this.setState({screen:s}); }\n  start=()=>this.go('setup');\n  back=()=>{ const o=['intro','setup','tried','freq','leans','intent']; const i=o.indexOf(this.state.screen); if(this.state.screen==='reveal'){this.go('intent');return;} if(i>0) this.go(o[i-1]); };\n  next=()=>{ const o=['setup','tried','freq','leans','intent']; const s=this.state.screen; if(s==='intro'){this.go('setup');return;} const i=o.indexOf(s); if(i>=0&&i<o.length-1){this.go(o[i+1]);return;} if(s==='intent') this.goBuilding(); };\n  goBuilding=()=>{ this.go('building'); if(this._t) clearTimeout(this._t); this._t=setTimeout(()=>this.go('reveal'),1600); };\n  restart=()=>{ if(this._t) clearTimeout(this._t); this.setState({screen:'intro', name:'', age:'', hood:'East Coast', tried:{}, freq:'', leans:{}, intent:'', viz:null}); };\n  loadSample=()=>{ if(this._t) clearTimeout(this._t); this.setState({ screen:'reveal', name:'Amara', age:'5', hood:'East Coast', tried:{sports:true,dance:true,play:true,arts:true,museum:true}, freq:'weekly', leans:{Physical:true,Creative:true}, intent:'new', viz:this.state.viz }); };\n  openFramework=(from)=>this.setState({screen:'framework', fwReturn:from||'intro'});\n  closeFramework=()=>this.go(this.state.fwReturn||'intro');\n  toggleFw=(k)=>this.setState(s=>({fwOpen:s.fwOpen===k?null:k}));\n\n  onName=(e)=>this.setState({name:e.target.value});\n  onAge=(e)=>this.setState({age:e.target.value});\n  setHood=(h)=>this.setState({hood:h});\n  toggleTried=(k)=>this.setState(s=>({tried:{...s.tried,[k]:!s.tried[k]}}));\n  setFreq=(f)=>this.setState({freq:f});\n  toggleLean=(t)=>this.setState(s=>({leans:{...s.leans,[t]:!s.leans[t]}}));\n  setIntent=(v)=>this.setState({intent:v});\n  setViz=(v)=>this.setState({viz:v});\n\n  icon(tr,color,size){\n    size=size||22;\n    const inner = tr==='Cognitive'\n      ? [React.createElement('circle',{key:'c',cx:12,cy:12,r:9}), React.createElement('path',{key:'p',d:'M16 8l-3 5-5 3 3-5z'})]\n      : [React.createElement('path',{key:'p',d:{Physical:'M22 12h-4l-3 9L9 3l-3 9H2',Creative:'M12 3l1.9 4.6L18.5 9.5 13.9 11.4 12 16l-1.9-4.6L5.5 9.5 10.1 7.6z',Social:'M12 21s-7-4.5-9.5-9C1 9 2.5 5.5 6 5.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.5 0 5 3.5 3.5 6.5C19 16.5 12 21 12 21z'}[tr]})];\n    return React.createElement('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:color,strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},inner);\n  }\n\n  renderVals(){\n    const st=this.state;\n    const TRAILS={\n      Physical:{plain:'Physical',theme:'Body & Movement',color:'#009b4d',dark:'#009b4d',soft:'#e5f5ed',chipBg:'#f2f8f4',chipBd:'#e0eee7',chipTx:'#3f6b52'},\n      Creative:{plain:'Creative',theme:'Imagination & Expression',color:'#eec71b',dark:'#b98900',soft:'#fbf1cf',chipBg:'#fdf8e8',chipBd:'#f2e6bf',chipTx:'#8a6800'},\n      Social:{plain:'Social',theme:'People & Heart',color:'#ab5f99',dark:'#9c4f8b',soft:'#f4e9f1',chipBg:'#f8f0f6',chipBd:'#ecd9e7',chipTx:'#8a4a7b'},\n      Cognitive:{plain:'Cognitive',theme:'Curiosity & Discovery',color:'#0795ed',dark:'#0b6fb0',soft:'#e1f1fc',chipBg:'#eef7fe',chipBd:'#cfe3f6',chipTx:'#0b6fb0'},\n    };\n    const SUBS=[\n      {key:'sports',label:'Sports & swimming',trail:'Physical',also:['Social']},\n      {key:'dance',label:'Dance & ballet',trail:'Physical',also:['Creative']},\n      {key:'martial',label:'Martial arts',trail:'Physical',also:['Social']},\n      {key:'play',label:'Gym & play spaces',trail:'Physical',also:['Social']},\n      {key:'wellness',label:'Yoga & wellness',trail:'Physical',also:['Social']},\n      {key:'music',label:'Music',trail:'Creative',also:[]},\n      {key:'arts',label:'Arts & crafts',trail:'Creative',also:[]},\n      {key:'performing',label:'Drama & performing',trail:'Creative',also:['Social']},\n      {key:'languages',label:'Languages',trail:'Creative',also:['Cognitive']},\n      {key:'museum',label:'Museums & science',trail:'Cognitive',also:[]},\n      {key:'nature',label:'Nature & outdoors',trail:'Cognitive',also:['Physical']},\n      {key:'tech',label:'Coding & tech',trail:'Cognitive',also:[]},\n      {key:'life',label:'Cooking & life skills',trail:'Social',also:['Cognitive']},\n    ];\n    const KEYLABEL={}; SUBS.forEach(s=>KEYLABEL[s.key]=s.label);\n    const triedKeys = Object.keys(st.tried).filter(k=>st.tried[k]);\n    const useSample = triedKeys.length===0;\n    const tried = useSample ? {sports:true,dance:true,play:true,arts:true,museum:true} : st.tried;\n    const freq = useSample ? 'weekly' : (st.freq||'sometimes');\n    const leans = useSample ? {Physical:true,Creative:true} : st.leans;\n    const intent = st.intent || 'new';\n    const childName = (st.name && st.name.trim()) ? st.name.trim() : (useSample?'Amara':'your child');\n    const ageTxt = (st.age && String(st.age).trim()) ? (String(st.age).trim()+' y.o') : (useSample?'5 y.o':'');\n    const childHeading = childName + (ageTxt?(', '+ageTxt):'');\n\n    // ---------- scoring ----------\n    const ts={Physical:0,Cognitive:0,Creative:0,Social:0};\n    const ss={}; SUBS.forEach(s=>ss[s.key]=0);\n    const fw = {weekly:1,sometimes:0.65,oneoff:0.4}[freq] ?? 0.65;\n    if(useSample){\n      Object.assign(ts,{Physical:10,Creative:6.5,Social:3.2,Cognitive:1.5});\n      Object.assign(ss,{sports:8,dance:8,martial:0,play:5,wellness:1,music:1,arts:7,performing:4,languages:0,museum:3,nature:1,tech:0,life:3});\n    } else {\n      SUBS.forEach(s=>{ if(tried[s.key]){ ts[s.trail]+=4.0*fw; s.also.forEach(t=>ts[t]+=1.6*fw); ss[s.key]= freq==='weekly'?8:freq==='sometimes'?6:4; } });\n      Object.keys(leans).forEach(t=>{ if(leans[t]) ts[t]+=1.2; });\n      SUBS.forEach(s=>{ if(!tried[s.key] && leans[s.trail]) ss[s.key]=Math.max(ss[s.key],1.5); });\n      Object.keys(ts).forEach(k=>ts[k]=Math.max(0,Math.min(10,ts[k])));\n    }\n    const level=(sc)=> sc>=7?{l:'Well travelled',b:'well'}: sc>=4?{l:'Explored',b:'exp'}: sc>=2?{l:'Getting started',b:'grow'}:{l:'New ground',b:'new'};\n    const pipN={well:4,exp:3,grow:2,new:1};\n    const TRAILDEF={\n      Physical:'Growing through the body. Running, climbing, balancing, and building strength and coordination.',\n      Creative:'Imagining and expressing. Making, music, performing, and telling stories.',\n      Social:'Growing with others. Sharing, cooperating, and building confidence and heart.',\n      Cognitive:'Making sense of the world. Asking questions, exploring nature, and figuring things out.',\n    };\n\n    // ---------- coverage cards ----------\n    const cardOrder=['Physical','Creative','Social','Cognitive'];\n    const coverage = cardOrder.map(tr=>{\n      const m=TRAILS[tr], sc=ts[tr], lv=level(sc), fill=pipN[lv.b];\n      const pips=[0,1,2,3].map(i=>({style:`flex:1;height:6px;border-radius:99px;background:${i<fill?m.color:'#ececec'}`}));\n      const catOn=`font:600 11.5px/1 'Manrope';color:${m.chipTx};background:${m.chipBg};border:1px solid ${m.chipBd};padding:6px 10px;border-radius:8px`;\n      const catOff=`font:600 11.5px/1 'Manrope';color:#ada99c;background:#f6f5ef;border:1px dashed #dedbce;padding:6px 10px;border-radius:8px`;\n      const cats = SUBS.filter(s=>s.trail===tr).map(s=>({label:KEYLABEL[s.key], style: tried[s.key]?catOn:catOff}));\n      const isSocial = tr==='Social';\n      const socialNote = sc>=2 ? `Rarely booked on its own. Growing quietly through everything ${childName} does.` : `Grows as ${childName} spends time with other children.`;\n      return { key:tr, theme:m.theme, plain:m.plain, color:m.color, dark:m.dark, soft:m.soft, level:lv.l,\n        def:TRAILDEF[tr], cats, isSocial, socialNote,\n        icon:this.icon(tr,m.dark,22),\n        iconBox:`width:42px;height:42px;border-radius:13px;background:${m.soft};color:${m.dark};display:flex;align-items:center;justify-content:center;flex:none`,\n        cardStyle:`background:#fff;border:${lv.b==='new'?'1px dashed #cfd9e6':'1px solid #eeece3'};border-radius:18px;padding:15px 15px 16px;box-shadow:0 2px 8px rgba(0,0,0,.04)`,\n        levelChip:`font:700 11px/1 'Manrope';color:${m.dark};background:${m.soft};padding:6px 10px;border-radius:999px;white-space:nowrap`,\n        legendStyle:`background:#fff;border:${lv.b==='new'?'1px dashed #cfd9e6':'1px solid #eeece3'};border-radius:14px;padding:10px 12px`,\n        pips };\n    });\n\n    // ---------- radar (4 trail) ----------\n    const R=110,cx=160,cy=150;\n    const nP=cy-R*ts.Physical/10, eR=cx+R*ts.Creative/10, sK=cy+R*ts.Cognitive/10, wS=cx-R*ts.Social/10;\n    const f1=x=>Number(x.toFixed(1));\n    const radarPoly=`160,${f1(nP)} ${f1(eR)},150 160,${f1(sK)} ${f1(wS)},150`;\n    const radarDots=[{cx:160,cy:f1(nP),fill:'#009b4d'},{cx:f1(eR),cy:150,fill:'#eec71b'},{cx:160,cy:f1(sK),fill:'#0795ed'},{cx:f1(wS),cy:150,fill:'#ab5f99'}];\n\n    // ---------- full radar (13 spokes) ----------\n    const CX=250,CY=250,RR=178,n=SUBS.length,step=2*Math.PI/n;\n    const ang=i=>-Math.PI/2+i*step;\n    const P=(a,r)=>[CX+Math.cos(a)*r, CY+Math.sin(a)*r];\n    const DOT={Physical:'#009b4d',Creative:'#eec71b',Social:'#ab5f99',Cognitive:'#0795ed'};\n    const fullPts=SUBS.map((s,i)=>{ const a=ang(i); const [px,py]=P(a,(ss[s.key]/10)*RR); const [ax,ay]=P(a,RR); const [lx,ly]=P(a,RR+16); const co=Math.cos(a),si=Math.sin(a);\n      return {name:s.label.split(' & ')[0].split(' &')[0], px:f1(px),py:f1(py),ax:f1(ax),ay:f1(ay),lx:f1(lx),ly:f1(ly+(si>0.4?9:si<-0.4?-2:4)), anchor:co>0.25?'start':co<-0.25?'end':'middle', color:DOT[s.trail]}; });\n    const fullPoly=fullPts.map(p=>p.px+','+p.py).join(' ');\n    const rings=[0.25,0.5,0.75,1].map(fr=>SUBS.map((s,i)=>{const [x,y]=P(ang(i),RR*fr);return f1(x)+','+f1(y);}).join(' '));\n    const spokes=fullPts.map(p=>({x1:CX,y1:CY,x2:p.ax,y2:p.ay}));\n    const SOFT={Physical:'#dff0e7',Creative:'#fbf1cf',Social:'#f2e5ef',Cognitive:'#dcecfb'};\n    const wedges=['Physical','Cognitive','Creative','Social'].map(tr=>{ const idx=SUBS.map((s,i)=>s.trail===tr?i:-1).filter(i=>i>=0); const a0=ang(idx[0])-step/2,a1=ang(idx[idx.length-1])+step/2; const [sx,sy]=P(a0,RR),[ex,ey]=P(a1,RR); const large=(a1-a0)>Math.PI?1:0; return {d:`M ${CX} ${CY} L ${f1(sx)} ${f1(sy)} A ${RR} ${RR} 0 ${large} 1 ${f1(ex)} ${f1(ey)} Z`, fill:SOFT[tr]}; });\n\n    // ---------- summary + rec ----------\n    const scored=[['Physical',ts.Physical],['Creative',ts.Creative],['Social',ts.Social],['Cognitive',ts.Cognitive]];\n    const top=[...scored].sort((a,b)=>b[1]-a[1])[0][0];\n    const low=[...scored].sort((a,b)=>a[1]-b[1])[0][0];\n    const recTrail = intent==='more'?top : intent==='new'?low : 'Social';\n    const NAMEOF={Physical:'movement',Creative:'making and imagining',Social:'being with others',Cognitive:'curiosity and discovery'};\n    const summaryLine = `${childName} reaches most for ${NAMEOF[top]}. ${TRAILS[low].plain} is the open frontier, plenty of new ground to explore.`;\n    const REC={\n      Cognitive:{t:'Little Sprouts Nature Club',m:'Pasir Ris · 3–6 y.o · Cognitive',img:window.__resources.recP1},\n      Social:{t:'Weekend Playgroup Adventures',m:'Katong · 3–5 y.o · Social',img:window.__resources.recP3},\n      Creative:{t:'Tiny Makers Art Studio',m:'Joo Chiat · 4–7 y.o · Creative',img:window.__resources.recP2},\n      Physical:{t:'Splash Swim School',m:'East Coast · 3–8 y.o · Physical',img:window.__resources.recP4},\n    };\n    const rec=REC[recTrail];\n    const recEyebrow = intent==='more'?'More of what they love' : intent==='surprise'?'A little something different' : 'Worth trying next';\n\n    // ---------- framework ----------\n    const FWEX={\n      Physical:['Swimming','Dance','Martial arts','Gym & play'],\n      Creative:['Art & crafts','Music','Drama','Languages'],\n      Social:['Playgroups','Team sports','Cooking together'],\n      Cognitive:['Science','Nature','Coding','Museums'],\n    };\n    const fwChip=(m)=>`font:600 11.5px/1 'Manrope';color:${m.chipTx};background:${m.chipBg};border:1px solid ${m.chipBd};padding:7px 11px;border-radius:999px`;\n    const fwTrails=['Physical','Creative','Social','Cognitive'].map(tr=>{ const m=TRAILS[tr]; return {\n      key:tr, plain:m.plain, theme:m.theme, color:m.color, dark:m.dark, soft:m.soft, def:TRAILDEF[tr],\n      icon:this.icon(tr,m.dark,24), iconSm:this.icon(tr,m.dark,22),\n      examples:FWEX[tr].map(e=>({label:e, style:fwChip(m)})),\n      open:st.fwOpen===tr, onToggle:()=>this.toggleFw(tr),\n      iconBox:`width:46px;height:46px;border-radius:14px;background:${m.soft};color:${m.dark};display:flex;align-items:center;justify-content:center;flex:none`,\n      storyStyle:`background:${m.soft};border-radius:20px;padding:20px`,\n      cardStyle:`background:#fff;border:1px solid #eeece3;border-radius:18px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,.04)`,\n      accHeadStyle:`display:flex;align-items:center;gap:13px;width:100%;padding:15px;background:#fff;border:1px solid #eeece3;border-radius:16px;cursor:pointer;text-align:left`,\n      chevStyle:`transition:transform .2s ease;transform:rotate(${st.fwOpen===tr?'180deg':'0deg'});color:#a7a08f;flex:none`,\n    }; });\n    const fwStyle = this.props.frameworkStyle || 'story';\n\n    // compass diagram\n    const CC2=130, CR2=112;\n    const cpt=(deg,r)=>[f1(CC2+Math.cos(deg*Math.PI/180)*r), f1(CC2+Math.sin(deg*Math.PI/180)*r)];\n    const QUAD=[{tr:'Physical',mid:-90},{tr:'Creative',mid:0},{tr:'Cognitive',mid:90},{tr:'Social',mid:180}];\n    const compassWedges=QUAD.map(q=>{ const a0=q.mid-44,a1=q.mid+44; const p0=cpt(a0,CR2),p1=cpt(a1,CR2),lp=cpt(q.mid,CR2*0.6); const m=TRAILS[q.tr]; const on=st.fwOpen===q.tr;\n      return {tr:q.tr, d:`M ${CC2} ${CC2} L ${p0[0]} ${p0[1]} A ${CR2} ${CR2} 0 0 1 ${p1[0]} ${p1[1]} Z`, fill:on?m.color:m.soft, txcol:on?'#ffffff':m.dark, lx:lp[0], ly:f1(lp[1]+4), plain:m.plain, onClick:()=>this.toggleFw(q.tr)}; });\n    const compassSel = st.fwOpen ? fwTrails.find(t=>t.key===st.fwOpen) : null;\n\n    // ---------- question copy sets ----------\n    const COPY={\n      warm:{\n        setup:['Tell us about your little one','Just the basics to get started, and it all stays on your device.'],\n        tried:[`Where has ${childName} been so far?`,`Tap everything they've had a go at. Big or small, a proper class or a fun day out. There are no wrong answers.`],\n        freq:['How much is on the calendar?','Weekly clubs and one-off outings both count. Busy or gentle, every rhythm is a good one.'],\n        leans:['What does '+childName+' love doing?','What do they gravitate towards? Pick as many as ring true.'],\n        intent:['What would you love to find next?','No pressure. This just shapes the ideas we share at the end.'],\n      },\n      playful:{\n        setup:['Who are we adventuring with today?','Just the basics to get started, and it all stays on your device.'],\n        tried:[`What has ${childName} already explored?`,`Tick off everything they've tried. Clubs, camps, or a one-off day out.`],\n        freq:['How busy is the week?','From weekly clubs to the odd outing, it all counts.'],\n        leans:['What pulls '+childName+' in?','What do they drift towards on their own? Pick as many as fit.'],\n        intent:['What are you hoping to discover?','No pressure. It just shapes the ideas we share at the end.'],\n      },\n      direct:{\n        setup:['A few details about your child','Just the basics to get started, and it all stays on your device.'],\n        tried:[`What has ${childName} tried before?`,`Select everything they've done. Classes, camps, or day trips.`],\n        freq:['How often do activities happen?','Weekly clubs and occasional outings both count.'],\n        leans:['What does '+childName+' enjoy most?','What do they choose on their own? Pick as many as apply.'],\n        intent:['What are you looking for next?','This shapes the ideas we share at the end.'],\n      },\n    };\n    const cs = COPY[this.props.questionSet||'warm'] || COPY.warm;\n\n    // ---------- viz + steps ----------\n    const viz = st.viz || this.props.vizStyle || 'cards';\n    const seg=(on)=>`flex:1;border:none;border-radius:9px;padding:9px 0;font:700 12.5px 'Manrope';cursor:pointer;${on?'background:#fff;color:#0c3c26;box-shadow:0 1px 3px rgba(0,0,0,.12)':'background:transparent;color:#8a8a8a'}`;\n\n    const stepMap={setup:1,tried:2,freq:3,leans:4,intent:5};\n    const stepIdx=stepMap[st.screen]||1;\n\n    // ---------- inputs / chips ----------\n    const HOODS=['East Coast','Central','West','North','Anywhere'];\n    const hoodBtn=(on)=>`padding:10px 15px;border-radius:999px;font:600 13px 'Manrope';cursor:pointer;border:1.5px solid ${on?'#009b4d':'#ddd'};background:${on?'#e5f5ed':'#fff'};color:${on?'#0c7a41':'#555'}`;\n    const hoodChips=HOODS.map(h=>({label:h, style:hoodBtn(st.hood===h), onClick:()=>this.setHood(h)}));\n\n    const chipBtn=(on)=>`padding:11px 15px;border-radius:12px;font:600 13.5px 'Manrope';cursor:pointer;border:1.5px solid ${on?'#009b4d':'#e2e0d6'};background:${on?'#e5f5ed':'#fff'};color:${on?'#0c7a41':'#444'}`;\n    const q1chips=SUBS.map(s=>({label:s.label, style:chipBtn(!!st.tried[s.key]), onClick:()=>this.toggleTried(s.key)}));\n\n    const optBtn=(on)=>`display:flex;flex-direction:column;align-items:flex-start;text-align:left;width:100%;padding:16px;border-radius:16px;cursor:pointer;border:2px solid ${on?'#009b4d':'#e7e4d9'};background:${on?'#f2faf5':'#fff'}`;\n    const FREQ=[{k:'weekly',l:'Every week',d:'A regular class or club'},{k:'sometimes',l:'Now and then',d:'A few times a month'},{k:'oneoff',l:'Mostly one-off outings',d:'Trips and drop-ins'}];\n    const freqOpts=FREQ.map(o=>({label:o.l,desc:o.d,style:optBtn(st.freq===o.k),onClick:()=>this.setFreq(o.k)}));\n\n    const leanRow=(on)=>`display:flex;align-items:center;gap:13px;width:100%;padding:14px;border-radius:16px;cursor:pointer;text-align:left;border:2px solid ${on?'#009b4d':'#e7e4d9'};background:${on?'#f2faf5':'#fff'}`;\n    const LEANS=[{t:'Physical',l:'Running & moving'},{t:'Creative',l:'Making & creating'},{t:'Cognitive',l:'Figuring things out'},{t:'Social',l:'Being with others'}];\n    const leanOpts=LEANS.map(o=>({label:o.l, soft:TRAILS[o.t].soft, color:TRAILS[o.t].dark, icon:this.icon(o.t,TRAILS[o.t].dark,20), style:leanRow(!!st.leans[o.t]), onClick:()=>this.toggleLean(o.t)}));\n\n    const INTENT=[{k:'more',l:'More of what they love',d:'Go deeper in their favourites'},{k:'new',l:'Something new',d:'Explore fresh ground'},{k:'surprise',l:'Surprise us',d:'A little of everything'}];\n    const intentOpts=INTENT.map(o=>({label:o.l,desc:o.d,style:optBtn(st.intent===o.k),onClick:()=>this.setIntent(o.k)}));\n\n    return {\n      isIntro:st.screen==='intro', isSetup:st.screen==='setup', isTried:st.screen==='tried', isFreq:st.screen==='freq', isLeans:st.screen==='leans', isIntent:st.screen==='intent', isBuilding:st.screen==='building', isReveal:st.screen==='reveal',\n      start:this.start, back:this.back, next:this.next, restart:this.restart, loadSample:this.loadSample,\n      onName:this.onName, onAge:this.onAge, nameVal:st.name, ageVal:st.age, hoodVal:st.hood, hoodChips,\n      q1chips, freqOpts, leanOpts, intentOpts,\n      setupTitle:cs.setup[0], setupSub:cs.setup[1], triedTitle:cs.tried[0], triedSub:cs.tried[1],\n      freqTitle:cs.freq[0], freqSub:cs.freq[1], leansTitle:cs.leans[0], leansSub:cs.leans[1],\n      intentTitle:cs.intent[0], intentSub:cs.intent[1],\n      stepPct:(stepIdx/5*100)+'%', stepLabel:'Step '+stepIdx+' of 5',\n      childName, childHeading, summaryLine,\n      coverage, radarPoly, radarDots, wedges, rings, spokes, fullPts, fullPoly,\n      vizCards:viz==='cards', vizRadar:viz==='radar', vizFull:viz==='full',\n      setCards:()=>this.setViz('cards'), setRadar:()=>this.setViz('radar'), setFull:()=>this.setViz('full'),\n      segCards:seg(viz==='cards'), segRadar:seg(viz==='radar'), segFull:seg(viz==='full'),\n      vizAnimStyle: (this.props.animateReveal===false)?'':'animation:revealIn .5s ease both',\n      isFramework:st.screen==='framework', openFw:()=>this.openFramework(st.screen), closeFw:this.closeFramework,\n      fwTrails, fwStory:fwStyle==='story', fwCards:fwStyle==='cards', fwAccordion:fwStyle==='accordion',\n      fwCompass:fwStyle==='compass', compassWedges, compassSel, compassNone:!st.fwOpen,\n      recEyebrow, recTitle:rec.t, recMeta:rec.m,\n      recImgEl: React.createElement('img',{src:rec.img, alt:'', style:{width:58,height:58,borderRadius:11,objectFit:'cover',flex:'none'}}),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
